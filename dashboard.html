<!DOCTYPE html>
<html>

<head>

<title>Dashboard | Gold Fundamentals</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="gf-dash-header">
  <div class="gf-wordmark">Gold Fundamentals</div>
  <a href="/logout" class="btn btn-danger">Logout</a>
</div>

<div class="gf-dash-body">

  <div class="gf-panel">
    <h3 class="mb-4">Loan Details</h3>

    <input id="amount" class="form-control mb-3" placeholder="Loan Amount">

    <input id="interest" class="form-control mb-3" placeholder="Interest Rate %">

    <input id="years" class="form-control mb-3" placeholder="Years">

    <button onclick="calculateLoan()" class="btn btn-primary w-100">Calculate</button>
  </div>

  <div class="gf-panel" id="ledger">
    <h3 class="mb-4">Repayment Summary</h3>

    <div class="gf-ledger-row gf-primary">
      <span class="gf-label">Monthly payment</span>
      <span class="gf-value" id="payment">$0.00</span>
    </div>
    <div class="gf-ledger-row">
      <span class="gf-label">Total interest</span>
      <span class="gf-value" id="totalInterest">$0.00</span>
    </div>
    <div class="gf-ledger-row">
      <span class="gf-label">Total repayment</span>
      <span class="gf-value" id="totalRepayment">$0.00</span>
    </div>
  </div>

</div>

<script src="calculator.js"></script>

<footer style="text-align: center; padding: 20px; margin-top: 0; font-size: 0.85rem;">
  <p>© 2026. Created by Lona Smith in the Republic of South Africa · <a href="mailto:lonasmithhq@gmail.com" style="text-decoration: none;">lonasmithhq@gmail.com</a></p>
</footer>

</body>

</html>
