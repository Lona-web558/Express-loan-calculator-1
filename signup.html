<!DOCTYPE html>
<html>

<head>

<title>Create Account | Gold Fundamentals</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="gf-auth">

  <div class="gf-brand-panel">
    <div class="gf-wordmark">Gold Fundamentals</div>
    <div class="gf-brand-statement">Join Gold Fundamentals and put a real number on your next loan.</div>
    <div class="gf-fine-print">Already have an account? <a href="/login">Login</a></div>
  </div>

  <div class="gf-form-panel">
    <div class="gf-form-inner">

      <h2 class="mb-4">Create Account</h2>

      <form action="/auth/signup" method="POST">

        <input class="form-control mb-3" name="name" placeholder="Name">

        <input class="form-control mb-3" name="email" placeholder="Email">

        <input class="form-control mb-3" type="password" name="password" placeholder="Password">

        <button class="btn btn-success w-100">Create Account</button>

      </form>

    </div>
  </div>

</div>

<footer style="text-align: center; padding: 20px; margin-top: 0; font-size: 0.85rem;">
  <p>© 2026. Created by Lona Smith in the Republic of South Africa · <a href="mailto:lonasmithhq@gmail.com" style="text-decoration: none;">lonasmithhq@gmail.com</a></p>
</footer>

</body>

</html>
